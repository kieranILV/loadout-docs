<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="purpleGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#472DF9"/>
    </linearGradient>
    <linearGradient id="greenGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#070022"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Fee Structure</text>
  <text x="400" y="55" text-anchor="middle" fill="#9CA3AF" font-size="12">Every trade funds the game you're backing</text>
  
  <!-- Trade Amount Box -->
  <g filter="url(#shadow3)">
    <rect x="300" y="85" width="200" height="60" rx="10" fill="#1F2937"/>
    <text x="400" y="115" text-anchor="middle" fill="#9CA3AF" font-size="12">TRADE AMOUNT</text>
    <text x="400" y="135" text-anchor="middle" fill="white" font-size="18" font-weight="bold">100 SOL</text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 400 150 L 400 175" fill="none" stroke="#6B7280" stroke-width="2"/>
  <polygon points="400,185 393,175 407,175" fill="#6B7280"/>
  
  <!-- Fee Box -->
  <g filter="url(#shadow3)">
    <rect x="300" y="190" width="200" height="50" rx="10" fill="url(#purpleGrad3)"/>
    <text x="400" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">TRADING FEE</text>
    <text x="400" y="233" text-anchor="middle" fill="white" font-size="16" font-weight="bold">5 SOL (5%)</text>
  </g>
  
  <!-- Split Arrow -->
  <path d="M 400 245 L 400 270" fill="none" stroke="#6B7280" stroke-width="2"/>
  <path d="M 400 270 L 200 320" fill="none" stroke="#10B981" stroke-width="2"/>
  <path d="M 400 270 L 600 320" fill="none" stroke="#3B82F6" stroke-width="2"/>
  
  <!-- Treasury Split -->
  <g filter="url(#shadow3)">
    <rect x="80" y="310" width="240" height="100" rx="12" fill="#1F2937"/>
    <rect x="80" y="310" width="240" height="35" rx="12" fill="url(#greenGrad3)"/>
    <rect x="80" y="333" width="240" height="12" fill="#1F2937"/>
    <text x="200" y="335" text-anchor="middle" fill="white" font-size="14" font-weight="700">PROJECT TREASURY</text>
    <text x="200" y="370" text-anchor="middle" fill="#34D399" font-size="24" font-weight="bold">4.75 SOL</text>
    <text x="200" y="395" text-anchor="middle" fill="#9CA3AF" font-size="12">95% of fees → Game development</text>
  </g>
  
  <!-- Protocol Split -->
  <g filter="url(#shadow3)">
    <rect x="480" y="310" width="240" height="100" rx="12" fill="#1F2937"/>
    <rect x="480" y="310" width="240" height="35" rx="12" fill="url(#blueGrad)"/>
    <rect x="480" y="333" width="240" height="12" fill="#1F2937"/>
    <text x="600" y="335" text-anchor="middle" fill="white" font-size="14" font-weight="700">LOADOUT PROTOCOL</text>
    <text x="600" y="370" text-anchor="middle" fill="#60A5FA" font-size="24" font-weight="bold">0.25 SOL</text>
    <text x="600" y="395" text-anchor="middle" fill="#9CA3AF" font-size="12">5% of fees → Platform ops</text>
  </g>
  
  <!-- Meteora badge -->
  <rect x="320" y="420" width="160" height="22" rx="4" fill="rgba(124,58,237,0.2)"/>
  <text x="400" y="435" text-anchor="middle" fill="#A78BFA" font-size="10">Enforced via Meteora DLMM</text>
  
  <!-- Loadout -->
  <text x="760" y="25" text-anchor="end" fill="#6B7280" font-size="12" font-weight="600">LOADOUT</text>
</svg>
