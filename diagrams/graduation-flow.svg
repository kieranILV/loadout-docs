<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="purpleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#472DF9"/>
    </linearGradient>
    <linearGradient id="greenGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="400" fill="#070022"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Graduation Mechanism</text>
  <text x="450" y="55" text-anchor="middle" fill="#9CA3AF" font-size="12">Projects graduate automatically when treasury target is hit</text>
  
  <!-- Phase 1: Pre-Graduation -->
  <g filter="url(#shadow2)">
    <rect x="50" y="100" width="240" height="200" rx="12" fill="#1F2937"/>
    <rect x="50" y="100" width="240" height="40" rx="12" fill="url(#purpleGrad2)"/>
    <rect x="50" y="128" width="240" height="12" fill="#1F2937"/>
    <text x="170" y="127" text-anchor="middle" fill="white" font-size="14" font-weight="700">PRE-GRADUATION</text>
    
    <text x="70" y="170" fill="#D1D5DB" font-size="12">✦ Bonding Curve Trading</text>
    <text x="70" y="195" fill="#D1D5DB" font-size="12">✦ 10% Fee on Trades</text>
    <text x="70" y="220" fill="#D1D5DB" font-size="12">✦ 9.5% → Treasury</text>
    <text x="70" y="245" fill="#D1D5DB" font-size="12">✦ 0.5% → Protocol</text>
    <text x="70" y="275" fill="#9CA3AF" font-size="11">Building treasury toward target...</text>
  </g>
  
  <!-- Graduation Trigger (Center) -->
  <g filter="url(#shadow2)">
    <rect x="350" y="140" width="200" height="120" rx="60" fill="url(#greenGrad2)"/>
    <text x="450" y="190" text-anchor="middle" fill="white" font-size="16" font-weight="700">🎓 GRADUATION</text>
    <text x="450" y="215" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="12">Treasury hits 150 SOL</text>
    <text x="450" y="235" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">(Automatic trigger)</text>
  </g>
  
  <!-- Phase 2: Post-Graduation -->
  <g filter="url(#shadow2)">
    <rect x="610" y="100" width="240" height="200" rx="12" fill="#1F2937"/>
    <rect x="610" y="100" width="240" height="40" rx="12" fill="url(#greenGrad2)"/>
    <rect x="610" y="128" width="240" height="12" fill="#1F2937"/>
    <text x="730" y="127" text-anchor="middle" fill="white" font-size="14" font-weight="700">POST-GRADUATION</text>
    
    <text x="630" y="170" fill="#D1D5DB" font-size="12">✦ Meteora DLMM Pool</text>
    <text x="630" y="195" fill="#D1D5DB" font-size="12">✦ Deeper Liquidity</text>
    <text x="630" y="220" fill="#D1D5DB" font-size="12">✦ Ongoing Fee Sharing</text>
    <text x="630" y="245" fill="#D1D5DB" font-size="12">✦ Platform Visibility ↑</text>
    <text x="630" y="275" fill="#34D399" font-size="11">Continuous funding unlocked!</text>
  </g>
  
  <!-- Arrows -->
  <path d="M 295 200 L 345 200" fill="none" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow2)"/>
  <path d="M 555 200 L 605 200" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Progress Bar Visual -->
  <rect x="100" y="330" width="700" height="30" rx="15" fill="#374151"/>
  <rect x="100" y="330" width="350" height="30" rx="15" fill="url(#purpleGrad2)"/>
  <rect x="450" y="330" width="350" height="30" rx="15" fill="url(#greenGrad2)"/>
  <circle cx="450" cy="345" r="20" fill="#070022" stroke="url(#greenGrad2)" stroke-width="3"/>
  <text x="450" y="350" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🎓</text>
  
  <text x="100" y="380" fill="#9CA3AF" font-size="11">Launch</text>
  <text x="450" y="380" text-anchor="middle" fill="#34D399" font-size="11" font-weight="600">150 SOL Treasury</text>
  <text x="800" y="380" text-anchor="end" fill="#9CA3AF" font-size="11">Ongoing Growth →</text>
  
  <!-- Loadout -->
  <text x="850" y="25" text-anchor="end" fill="#6B7280" font-size="12" font-weight="600">LOADOUT</text>
</svg>
